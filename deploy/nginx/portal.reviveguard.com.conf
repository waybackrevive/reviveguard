# ─── portal.reviveguard.com ──────────────────────────────────────────────────
# Client portal (Livewire)
# Same app, different domain → resolves portal guard + routes

server {
    listen 80;
    listen [::]:80;
    server_name portal.reviveguard.com;

    location / {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name portal.reviveguard.com;

    # ── SSL (Let's Encrypt via certbot) ──────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/portal.reviveguard.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.reviveguard.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Document root ─────────────────────────────────────────────────────────
    # Same codebase — portal routes differentiated by APP_URL / middleware
    root /var/www/reviveguard/public;
    index index.php;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/portal.reviveguard.com.access.log;
    error_log  /var/log/nginx/portal.reviveguard.com.error.log;

    client_max_body_size 16M;

    # ── Static assets ─────────────────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires     30d;
        add_header  Cache-Control "public, immutable";
        access_log  off;
        try_files   $uri =404;
    }

    # ── Storage symlink ───────────────────────────────────────────────────────
    location /storage {
        alias /var/www/reviveguard/storage/app/public;
        access_log off;
    }

    # ── Main Laravel router ───────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   unix:/run/php/php8.3-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        fastcgi_read_timeout 300;
        fastcgi_buffer_size  128k;
        fastcgi_buffers      4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ── Block sensitive files ─────────────────────────────────────────────────
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }

    location ~ \.(sql|md|lock|json|yaml|yml|sh)$ {
        deny all;
        return 404;
    }
}
