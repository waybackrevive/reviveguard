<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — ReviveGuard</title>
  <meta name="description" content="Contact ReviveGuard support, request a site evaluation, or claim your WaybackRevive alumni invite. We reply within one business day.">
  <link rel="canonical" href="https://reviveguard.com/contact/">
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/site.css">
</head>
<body>

<header class="nav is-scrolled" role="banner">
  <div class="container nav__inner">
    <a href="/" class="nav__logo"><span class="nav__dot"></span> Revive<span>Guard</span></a>
    <nav class="nav__links"><a href="/pricing/">Pricing</a><a href="/contact/">Contact</a></nav>
    <div class="nav__actions"><a href="https://app.reviveguard.com/evaluate" class="btn btn--primary">Get evaluation</a></div>
    <button class="nav__toggle" type="button" aria-label="Menu"><i data-lucide="menu" width="24"></i></button>
  </div>
</header>

<main>
  <section class="page-hero">
    <div class="container">
      <p class="eyebrow">Contact</p>
      <h1>Talk to our team</h1>
      <p class="lead" style="color:var(--text-muted-dark)">Evaluations, alumni invites, billing, emergencies — one form. We read every message and reply within one business day (Mon–Fri).</p>
    </div>
  </section>

  <section class="section">
    <div class="container" style="max-width:36rem">
      <form id="contactForm" class="form-grid" novalidate>
        <div class="form-field">
          <label for="first_name">First name *</label>
          <input type="text" id="first_name" name="first_name" required maxlength="80" autocomplete="given-name">
        </div>
        <div class="form-field">
          <label for="last_name">Last name</label>
          <input type="text" id="last_name" name="last_name" maxlength="80" autocomplete="family-name">
        </div>
        <div class="form-field form-field--full">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" required maxlength="254" autocomplete="email">
        </div>
        <div class="form-field form-field--full">
          <label for="website">Site URL</label>
          <input type="url" id="website" name="website" placeholder="https://" maxlength="300">
        </div>
        <div class="form-field form-field--full">
          <label for="topic_select">Topic *</label>
          <select id="topic_select" name="topic_select" required>
            <option value="">Select…</option>
            <option value="evaluation">Request evaluation</option>
            <option value="alumni">WaybackRevive alumni invite</option>
            <option value="pricing">Pricing question</option>
            <option value="support">Client support</option>
            <option value="emergency">Site emergency</option>
            <option value="other">Other</option>
          </select>
        </div>
        <input type="hidden" name="topic" id="topicInput" value="">
        <div class="form-field form-field--full">
          <label for="message">Message *</label>
          <textarea id="message" name="message" required minlength="10" maxlength="4000"></textarea>
        </div>
        <div style="display:none" aria-hidden="true"><input type="text" name="website_confirm" tabindex="-1" autocomplete="off"></div>
        <div class="form-field form-field--full">
          <button type="submit" class="btn btn--primary">Send message</button>
          <div id="formStatus" class="form-status" role="alert"></div>
        </div>
      </form>
      <p style="margin-top:2rem;font-size:0.875rem;color:var(--text-muted)">
        Emergency? Email <a href="mailto:support@reviveguard.com" style="color:var(--green)">support@reviveguard.com</a> directly — monitored around the clock.
      </p>
    </div>
  </section>
</main>

<footer class="footer"><div class="container footer__bottom" style="border:none"><span>© ReviveGuard</span></div></footer>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="/assets/js/site.js"></script>
</body>
</html>
