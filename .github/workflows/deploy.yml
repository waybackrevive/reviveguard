name: Deploy to Production

on:
  push:
    branches:
      - master

# Only one deployment at a time
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: app-code

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Install PHP + Composer ─────────────────────────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, curl, zip, pgsql, redis, bcmath, intl, gd
          coverage: none

      # ─── Install Composer dependencies (production only) ────────────────────
      - name: Composer install
        run: |
          composer install \
            --no-dev \
            --no-interaction \
            --prefer-dist \
            --optimize-autoloader \
            --ignore-platform-req=ext-pcntl \
            --ignore-platform-req=ext-posix

      # ─── Build frontend assets ──────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app-code/package-lock.json

      - name: NPM install + build
        run: |
          npm ci
          npm run build

      # ─── Run tests ──────────────────────────────────────────────────────────
      - name: Run test suite
        run: |
          php artisan test --stop-on-failure
        env:
          APP_ENV: testing
          APP_KEY: base64:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa=
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          RESEND_API_KEY: test_key
          WHOP_WEBHOOK_SECRET: test_secret
          UPTIME_KUMA_WEBHOOK_SECRET: test_secret

      # ─── Deploy via SSH ─────────────────────────────────────────────────────
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     22
          script: |
            set -e

            echo "=== [1/7] Pull latest code ==="
            cd /var/www/reviveguard
            git pull origin master

            echo "=== [2/7] Composer install ==="
            cd /var/www/reviveguard/app-code
            composer install \
              --no-dev \
              --no-interaction \
              --prefer-dist \
              --optimize-autoloader \
              --ignore-platform-req=ext-pcntl \
              --ignore-platform-req=ext-posix

            echo "=== [3/7] NPM build ==="
            npm ci
            npm run build

            echo "=== [4/7] Clear + cache config ==="
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            echo "=== [5/7] Run migrations ==="
            php artisan migrate --force

            echo "=== [6/7] Restart queue workers ==="
            sudo supervisorctl restart reviveguard-worker:*

            echo "=== [7/7] Restart Puppeteer service ==="
            pm2 restart reviveguard-pdf

            echo "✓ Deploy complete"
