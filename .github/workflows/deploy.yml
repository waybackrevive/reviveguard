name: Deploy to Production

on:
  push:
    branches:
      - master

# Only one deployment at a time
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ─── Job 1: Build & Test ────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-code

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: reviveguard_test
          POSTGRES_USER: reviveguard
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, curl, zip, pgsql, redis, bcmath, intl, gd
          coverage: none

      # Create .env BEFORE composer install so post-autoload-dump artisan calls work
      - name: Create CI .env
        run: |
          cp .env.example .env
          echo "APP_KEY=base64:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa=" >> .env
          echo "APP_ENV=testing" >> .env

      - name: Composer install (with dev deps for testing)
        run: |
          composer install \
            --no-interaction \
            --prefer-dist \
            --optimize-autoloader \
            --ignore-platform-req=ext-pcntl \
            --ignore-platform-req=ext-posix

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app-code/package-lock.json

      - name: NPM install + build
        run: |
          npm ci
          npm run build

      - name: Run test suite
        run: vendor/bin/phpunit --stop-on-failure
        env:
          APP_ENV: testing
          APP_KEY: base64:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa=
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: reviveguard_test
          DB_USERNAME: reviveguard
          DB_PASSWORD: secret
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          RESEND_API_KEY: test_key
          WHOP_WEBHOOK_SECRET: test_secret
          UPTIME_KUMA_WEBHOOK_SECRET: test_secret

  # ─── Job 2: Deploy via SSH ──────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     22
          script: |
            set -e

            # ── Load full user PATH (nvm, composer, npm, pm2) ──────────────────
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH="$HOME/.nvm/bin:$HOME/.composer/vendor/bin:/usr/local/bin:/usr/bin:$PATH"

            echo "=== [1/7] Pull latest code ==="
            cd /var/www/reviveguard
            git pull origin master

            echo "=== [2/7] Composer install ==="
            cd /var/www/reviveguard/app-code
            /usr/local/bin/composer install \
              --no-dev \
              --no-interaction \
              --prefer-dist \
              --optimize-autoloader \
              --ignore-platform-req=ext-pcntl \
              --ignore-platform-req=ext-posix

            echo "=== [3/7] NPM build ==="
            npm ci
            npm run build

            echo "=== [4/7] Cache config, routes, views ==="
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            echo "=== [5/7] Migrations ==="
            php artisan migrate --force

            echo "=== [6/7] Restart queue workers ==="
            sudo /usr/bin/supervisorctl restart reviveguard-worker:*

            echo "=== [7/7] Restart PDF service ==="
            pm2 restart reviveguard-pdf

            echo "✓ Deploy complete"
