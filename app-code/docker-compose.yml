version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: reviveguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: reviveguard
      POSTGRES_USER: reviveguard
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: reviveguard-redis
    restart: unless-stopped
    command: redis-server --requirepass secret
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
